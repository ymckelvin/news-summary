name: Daily AI Brief
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch-and-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: cp sources.example.yaml sources.yaml
      - run: mkdir -p briefs
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: python -m src.aid_runner
      - run: |
          git config user.name "AI Bot"
          git config user.email "bot@aid.local"
          git add briefs/
          git diff --cached --quiet || git commit -m "Daily brief $(date +%Y-%m-%d)"
          git push
